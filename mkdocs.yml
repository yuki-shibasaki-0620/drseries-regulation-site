site_name: Dr.series レギュレーション
site_description: Dr.series LEチームの法令・広告レギュレーション知識ベース

docs_dir: docs

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: red
      accent: deep-orange
  features:
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.share
    - content.tabs.link
    - toc.follow
  font:
    text: Noto Sans JP
    code: Roboto Mono
  icon:
    logo: material/scale-balance

nav:
  - ホーム: index.md
  - レギュレーション:
    - アセテクト: products/acetect.md
  - "表現OK/NG集":
    - アセテクト: products/acetect-expressions.md
  - 法令リファレンス:
    - LEの考え方: le-philosophy.md
    - 景表法: law/keihyohou.md
    - 薬機法: law/yakki.md
    - 特商法: law/tokushohou.md

plugins:
  - search:
      lang: ja

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.mark:
      smart_mark: false
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 2

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/clean-toc.js

extra:
  generator: false